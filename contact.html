<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="logo">Craft Workshop</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="workshops.html">Workshops</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- Title -->
<section class="booking-header">
    <h1>Contact Us</h1>
</section>

<!-- Form Section -->
<section class="form-section">

    <div class="form-box">

        <div class="info-box">
            <p>We’d love to hear from you. Fill out the form below and send us your message.</p>
        </div>

        <h2>Your Information</h2>

        <form class="workshop-form">

            <!-- First Name -->
            <label>First Name</label>
            <input type="text" placeholder="e.g. Sara" required>

            <!-- Last Name -->
            <label>Last Name</label>
            <input type="text" placeholder="e.g. Ahmed" required>

            <!-- Email -->
            <label>Email</label>
            <input type="email" placeholder="e.g. sara@email.com" required>

            <!-- Mobile -->
            <label>Mobile Number</label>
            <input type="tel" placeholder="05XXXXXXXX" pattern="[0-9]{10}" required>

            <!-- Date of Birth -->
            <label>Date of Birth</label>
            <input type="date" required>

            <!-- Gender -->
            <label>Gender</label>
            <div class="gender-group">
                <label><input type="radio" name="gender" value="male" required> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>

            <!-- Language -->
            <label>Language of Communication</label>
            <select required>
                <option value="">Select language</option>
                <option value="arabic">Arabic</option>
                <option value="english">English</option>
                <option value="french">French</option>
            </select>

            <!-- Message -->
            <label>Message</label>
            <textarea placeholder="Write your message here..." rows="5" required></textarea>

            <!-- Buttons -->
            <div class="form-buttons">
                <button type="submit" class="btn">Send Message</button>
                <button type="reset" class="btn">Reset</button>
            </div>

        </form>
    </div>

</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 Craft Workshop</p>
</footer>

</body>
</html>
