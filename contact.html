<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVIGATION ================= -->
<nav class="navbar">
    <div class="logo">Craft Workshop</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="workshops.html">Workshops</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- ================= HEADER ================= -->
<section class="booking-header">
    <h1>Contact Us</h1>
</section>

<!-- ================= FORM ================= -->
<section class="form-section">

    <div class="form-box">

        <div class="info-box">
            <p>We’d love to hear from you. Fill out the form below and send us your message.</p>
        </div>

        <h2>Your Information</h2>

        <form class="workshop-form" id="contactForm" novalidate>

            <!-- First Name -->
            <div>
                <label>First Name</label>
                <input type="text" name="fname" placeholder="e.g. Sara">
            </div>

            <!-- Last Name -->
            <div>
                <label>Last Name</label>
                <input type="text" name="lname" placeholder="e.g. Ahmed">
            </div>

            <!-- Email -->
            <div>
                <label>Email</label>
                <input type="email" name="email" placeholder="e.g. sara@email.com">
            </div>

            <!-- Mobile -->
            <div>
                <label>Mobile Number</label>
                <input type="text" name="mobile" placeholder="05XXXXXXXX">
            </div>

            <!-- Date of Birth -->
            <div>
                <label>Date of Birth</label>
                <input type="date" name="birthdate">
            </div>

            <!-- Gender -->
            <div>
                <label>Gender</label>
                <div class="gender-options">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male"> Male
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="gender" value="female"> Female
                    </label>
                </div>
            </div>

            <!-- Language -->
            <div>
                <label>Language of Communication</label>
                <select name="language">
                    <option value="">Select language</option>
                    <option value="arabic">Arabic</option>
                    <option value="english">English</option>
                    <option value="french">French</option>
                </select>
            </div>

            <!-- Message (full width like register notes) -->
            <div class="full-width">
                <label>Message</label>
                <textarea name="message" placeholder="Write your message here..." rows="5"></textarea>
            </div>

            <!-- Message result -->
            <p id="msg" class="full-width"></p>

            <!-- Buttons -->
            <div class="form-buttons">
                <button type="submit" class="btn">Send Message</button>
                <button type="reset" class="btn">Reset</button>
            </div>

        </form>

    </div>

</section>

<!-- ================= FOOTER ================= -->
<footer>
    <p>&copy; 2026 Craft Workshop</p>
</footer>

<script src="JS/script.js"></script>
</body>
</html>
