<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Workshop Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="logo">Craft Workshop</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="workshops.html">Workshops</a></li>
        <li><a href="booking.html">Booking</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- Booking Title -->
<section class="booking-header">
    <h1>Workshop Booking</h1>
</section>

<!-- Form Section -->
<section class="form-section">

    <div class="form-box">

        <span class="btn back-btn">← Back</span>

        <div class="info-box">
            <p>Fill in your details to reserve your spot in the workshop.</p>
        </div>

        <h2>Your Personal Information</h2>

        <form class="workshop-form">

            <!-- Full Name -->
            <label>Full Name</label>
            <input type="text" placeholder="e.g. Sara Ahmed" required minlength="3">

            <!-- Email -->
            <label>Email</label>
            <input type="email" placeholder="e.g. sara@email.com" required>

            <!-- Mobile -->
            <label>Mobile Number</label>
            <input type="tel" placeholder="e.g. 05XXXXXXXX" pattern="[0-9]{10}" required>

            <!-- Workshop -->
            <label>Workshop</label>
            <select required>
                <option value="">Select a workshop</option>
                <option value="candle">Candle Making</option>
                <option value="pottery">Pottery Workshop</option>
                <option value="painting">Painting Workshop</option>
            </select>

            <!-- Gender -->
            <label>Gender</label>
            <div class="gender-group">
                <label><input type="radio" name="gender" value="male" required> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>

            <!-- Date -->
            <label>Preferred Date</label>
            <input type="date" required>

            <!-- Time -->
            <label>Preferred Time</label>
            <input type="time" required>

            <!-- Notes -->
            <label>Additional Notes</label>
            <textarea placeholder="Any special requests..."></textarea>

            <!-- Buttons -->
            <div class="form-buttons">
                <button type="submit" class="btn">Submit</button>
                <button type="reset" class="btn">Reset</button>
            </div>

        </form>
    </div>

</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 Craft Workshop</p>
</footer>

</body>
</html>
