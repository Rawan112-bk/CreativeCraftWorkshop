<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Workshop Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVIGATION ================= -->
<nav class="navbar">
    <div class="logo">Craft Workshop</div>
</nav>

<!-- ================= HEADER ================= -->
<section class="booking-header">
    <h1 id="bookingTitle">Workshop Booking</h1>
</section>

<!-- ================= FORM ================= -->
<section class="form-section">

    <div class="form-box">

        <span class="btn back-btn" id="backBtn">← Back</span>

        <div class="info-box">
            <p>Fill in your details to reserve your spot in the workshop.</p>
        </div>

        <h2>Your Personal Information</h2>

        <form id="registerForm" class="workshop-form" novalidate>

            <div>
                <label>Workshop</label>
                <input type="text" id="workshopDisplay" name="workshopDisplay"
                       placeholder="Workshop will appear here" readonly>
            </div>

            <div>
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="e.g. Sara Ahmed"
                required minlength="5" maxlength="40" pattern="[A-Za-z ]+">
            </div>

            <div>
                <label>Email</label>
                <input type="email" name="registeremail" placeholder="e.g. sara@email.com"
                required maxlength="50">
            </div>

            <div>
                <label>Mobile Number</label>
                <input type="tel" name="registermobile" placeholder="05XXXXXXXX"
                required pattern="05[0-9]{8}">
            </div>

            <div>
                <label>Gender</label>
                <div class="gender-options">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male" required> Male
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="gender" value="female" required> Female
                    </label>
                </div>
            </div>

            <div>
                <label>Preferred Date</label>
                <input type="date" name="workshopdate" required>
            </div>

            <div>
                <label>Preferred Time</label>
                <input type="time" name="workshoptime" required>
            </div>

            <div class="full-width">
                <label>Additional Notes</label>
                <textarea name="notes" minlength="5" maxlength="200"></textarea>
            </div>

            <p id="registerMsg" class="full-width"></p>

            <div class="form-buttons">
                <button type="submit" class="btn">Submit</button>
                <button type="reset" class="btn">Reset</button>
            </div>

        </form>

    </div>

</section>

<footer>
    <p>&copy; 2026 Craft Workshop</p>
</footer>

<script src="script.js"></script>
</body>
</html>
